<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Markets Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:230px;
    background:#0f2027;
    color:white;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    text-align:center;
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
    margin:5px 0;
    border-radius:6px;
}

.sidebar a:hover{
    background:#1c3b4a;
}

/* Main */
.main{
    flex:1;
    background:#02193b;
    padding:20px;
}

.header{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background: #02193b;
    color: white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    background: green;
    color: white;
}

.switch-btn{
    background:#00c6ff;
    color:black;
    margin-top:10px;
}

.logout{
    background:#f44336;
    color:white;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Safe Markets</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="sell.html">Sell Product</a>
    <a href="reviews.html">Reviews</a>
    <a href="report.html">Report Issue</a>
</div>

<div class="card">
    <h3>Seller Verification</h3>

    <input type="text" id="businessName" placeholder="Business Name">
    
    <select id="category">
        <option value="">Select Category</option>
        <option>Electronics</option>
        <option>Fashion</option>
        <option>Home</option>
    </select>

    <input type="text" id="phone" placeholder="Phone Number">

    <input type="file" id="idUpload">

    <button onclick="submitVerification()">Submit for Approval</button>

    <p id="statusText"></p>
</div>

<!-- Main -->
<div class="main">

    <div class="header">User Dashboard</div>

    <div class="cards">

        <div class="card">
            <h3>Email</h3>
            <p id="userEmail"></p>
        </div>

        <div class="card">
            <h3>Current Role</h3>
            <p id="userRole"></p>
            <button class="switch-btn" onclick="switchRole()">Switch Role</button>
        </div>

        <div class="card">
            <h3>Trust Score</h3>
            <p id="trustScore"></p>
        </div>

        <div class="card">
            <h3>Quick Actions</h3>
            <button onclick="goMarketplace()">Go to Marketplace</button>
            <button onclick="goSell()">Sell Product</button>
        </div>

        <div class="card">
            <h3>Account</h3>
            <button class="logout" onclick="logout()">Logout</button>
        </div>

    </div>

</div>

<script>

/* Load User */
let user = JSON.parse(localStorage.getItem("activeUser"));

if(!user){
    window.location.href = "auth.html";
}

/* Fix old users */
if(!user.roles){
    user.roles = [user.role || "buyer"];
}

/* Status */
if(user.status === "pending"){
    document.getElementById("statusText").innerText = "Approval Pending...";
}
if(user.status === "approved"){
    document.getElementById("statusText").innerText = "Account Approved ✔";
}
if(user.status === "blocked"){
    alert("Account Blocked!");
    window.location.href = "auth.html";
}

/* Role */
let activeRole = localStorage.getItem("activeRole") || user.roles[0];

/* Display */
document.getElementById("userEmail").innerText = user.email;
document.getElementById("userRole").innerText = activeRole.toUpperCase();
document.getElementById("trustScore").innerText = user.trustScore + "%";

/* Switch Role */
function switchRole(){

    if(user.roles.length < 2){
        user.roles.push("seller");
    }

    activeRole = (activeRole === "buyer") ? "seller" : "buyer";

    localStorage.setItem("activeRole", activeRole);
    document.getElementById("userRole").innerText = activeRole.toUpperCase();

    alert("Switched to " + activeRole.toUpperCase());
}

/* Navigation */
function goMarketplace(){
    window.location.href = "marketplace.html";
}

function goSell(){
    if(activeRole !== "seller"){
        alert("Switch to SELLER role first!");
        return;
    }
    window.location.href = "sell.html";
}

/* Logout */
function logout(){
    localStorage.removeItem("activeUser");
    localStorage.removeItem("activeRole");
    window.location.href = "auth.html";
}

/* Verification */
function submitVerification(){

    let users = JSON.parse(localStorage.getItem("users"));
    let userIndex = users.findIndex(u => u.email === user.email);

    users[userIndex].businessName = document.getElementById("businessName").value;
    users[userIndex].category = document.getElementById("category").value;
    users[userIndex].phone = document.getElementById("phone").value;
    users[userIndex].idUploaded = true;
    users[userIndex].status = "pending";

    localStorage.setItem("users", JSON.stringify(users));

    // ✅ sync active user
    localStorage.setItem("activeUser", JSON.stringify(users[userIndex]));

    document.getElementById("statusText").innerText = "Approval Pending...";
}

</script>

</body>
</html>
