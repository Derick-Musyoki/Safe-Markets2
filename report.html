<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Markets - Report / Dispute</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:#0f2027;
    color:white;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    text-align:center;
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
    margin:5px 0;
    border-radius:6px;
}

.sidebar a:hover{
    background:#1c3b4a;
}

/* Main */
.main{
    flex:1;
    background: #02193b;
    padding:20px;
}

.header{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
    color: white;
}

form{
    background: rgb(175, 219, 108);
    padding:20px;
    border-radius:10px;
    max-width:500px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    background:#f44336;
    color:white;
    margin-top:10px;
}

.report-list{
    margin-top:20px;
    color: white;
}

.report-item{
    background:rgb(175, 219, 108);
    color: black;
    padding:15px;
    border-radius:5px;
    margin-bottom:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Safe Markets</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="sell.html">Sell Product</a>
    <a href="chat.html">Messages</a>
    <a href="reviews.html">Reviews</a>
    <a href="report.html">Report Issue</a>
</div>

<div class="main">
    <div class="header">Report / Dispute</div>

    <form id="reportForm">

        <!-- ✅ NEW PRODUCT SELECT SYSTEM -->
        <label>Product</label>
        <input type="text" id="selectedProduct" placeholder="Click to choose product" readonly onclick="goToMarketplace()" required>
        <input type="hidden" id="productId">

        <label>Issue Type</label>
        <select id="issueType" required>
            <option value="">Select issue</option>
            <option value="fake_product">Fake Product</option>
            <option value="fraudulent_seller">Fraudulent Seller</option>
            <option value="payment_issue">Payment Issue</option>
            <option value="delivery_issue">Delivery Issue</option>
            <option value="other">Other</option>
        </select>

        <label>Description</label>
        <textarea id="description" placeholder="Describe the issue..." rows="4" required></textarea>

        <button type="submit">Submit Report</button>
    </form>

    <div class="report-list" id="reportList">
        <h3>Submitted Reports</h3>
    </div>

</div>

<script>

/* Load user */
let user = JSON.parse(localStorage.getItem("activeUser"));
if(!user){
    window.location.href = "auth.html";
}

/* Load data */
let products = JSON.parse(localStorage.getItem("products")) || [];
let reports = JSON.parse(localStorage.getItem("reports")) || [];

/* Redirect to marketplace */
function goToMarketplace(){
    window.location.href = "marketplace.html?select=true";
}

/* Load selected product from marketplace */
let selectedProduct = JSON.parse(localStorage.getItem("selectedReportProduct"));

if(selectedProduct){
    document.getElementById("selectedProduct").value =
        selectedProduct.name + " (Seller: " + selectedProduct.seller + ")";
    document.getElementById("productId").value = selectedProduct.id;
}

/* Submit report */
document.getElementById("reportForm").addEventListener("submit", function(e){
    e.preventDefault();

    const productId = document.getElementById("productId").value;
    const issueType = document.getElementById("issueType").value;
    const description = document.getElementById("description").value;

    if(!productId){
        alert("Please select a product!");
        return;
    }

    const report = {
        id: Date.now(),
        reporter: user.email,
        productId,
        issueType,
        description,
        status: "pending"
    };

    reports.push(report);
    localStorage.setItem("reports", JSON.stringify(reports));

    /* Increase seller report count */
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let product = products.find(p => p.id == productId);

    if(product){
        let seller = users.find(u => u.email === product.seller);
        if(seller){
            seller.reports = (seller.reports || 0) + 1;
        }
    }

    localStorage.setItem("users", JSON.stringify(users));

    alert("Report submitted successfully!");

    /* Clear selection */
    localStorage.removeItem("selectedReportProduct");

    document.getElementById("reportForm").reset();
    renderReports();
});

/* Render reports */
function renderReports(){
    const container = document.getElementById("reportList");
    container.innerHTML = "<h3>Submitted Reports</h3>";

    reports
    .filter(r => r.reporter === user.email)
    .forEach(r => {
        const product = products.find(p => p.id == r.productId);

        const div = document.createElement("div");
        div.className = "report-item";

        div.innerHTML = `
            <strong>Product:</strong> ${product ? product.name : 'Deleted'}<br>
            <strong>Issue:</strong> ${r.issueType}<br>
            <strong>Description:</strong> ${r.description}<br>
            <strong>Status:</strong> ${r.status}
        `;

        container.appendChild(div);
    });
}

/* Init */
renderReports();

</script>

</body>
</html>
