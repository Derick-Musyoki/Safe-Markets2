<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Markets - Reviews</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* LAYOUT */
body{
    display:flex;
    background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#0f2027;
    color:white;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
    margin:5px 0;
    border-radius:6px;
}

.sidebar a:hover{
    background:#1c3b4a;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    background: #02193b;
    color: blueviolet;
}

/* HEADER */
header{
    font-size:22px;
    margin-bottom:20px;
    font-weight:bold;
}

/* SEARCH */
.search-box{
    margin-bottom:20px;
}

.search-box input{
    padding:10px;
    width:250px;
    border-radius:5px;
    border:1px solid #ccc;
}

.search-box button{
    padding:10px 15px;
    background:#00bcd4;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

/* RESULT CARD */
.result{
    max-width:600px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* TRUST */
.trust{
    font-weight:bold;
    margin-bottom:10px;
}

/* REVIEWS */
.review{
    background:#f1f1f1;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
}
</style>
</head>

<body>

<!-- MAIN CONTENT -->
<div class="main">

<header>🔍 Business Reviews & Trust</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Enter business name">
    <button onclick="searchBusiness()">Search</button>
</div>

<div id="resultContainer"></div>

</div>

<script>

/* Load data */
let users = JSON.parse(localStorage.getItem("users")) || [];
let reviews = JSON.parse(localStorage.getItem("reviews")) || {};
let products = JSON.parse(localStorage.getItem("products")) || [];

/* ✅ Ensure products have IDs */
products = products.map((p, index)=>{
    if(!p.id){
        p.id = Date.now() + index;
    }
    return p;
});
localStorage.setItem("products", JSON.stringify(products));

/* TRUST COLOR + LABEL */
function getTrustColor(score){
    if(score >= 80) return "green";
    if(score >= 50) return "orange";
    return "red";
}

function getTrustLabel(score){
    if(score >= 80) return "🟢 Trusted";
    if(score >= 50) return "🟡 Average";
    return "🔴 Risky";
}

/* SEARCH BUSINESS */
function searchBusiness(){

    let query = document.getElementById("searchInput").value.toLowerCase();

    let seller = users.find(u => 
        u.roles && u.roles.includes("seller") && u.businessName && u.businessName.toLowerCase().includes(query)
    );

    const container = document.getElementById("resultContainer");
    container.innerHTML = "";

    if(!seller){
        container.innerHTML = "<p>No business found</p>";
        return;
    }

    /* Collect reviews from all seller's products */
    let sellerReviews = [];
    products.filter(p => p.seller === seller.email).forEach(p=>{
        if(reviews[p.id]){
            reviews[p.id].forEach(r => sellerReviews.push(r));
        }
    });

    let avgRating = sellerReviews.length 
        ? (sellerReviews.reduce((a,b)=>a+b.rating,0)/sellerReviews.length).toFixed(1)
        : "No ratings";

    let trustScore = seller.trustScore || 50;

    /* CREATE RESULT CARD */
    let div = document.createElement("div");
    div.className = "result";

    div.innerHTML = `
        <h2>${seller.businessName}</h2>
        <p>Category: ${seller.category || "N/A"}</p>

        <p class="trust" style="color:${getTrustColor(trustScore)}">
            ${getTrustLabel(trustScore)} (${trustScore}%)
        </p>

        <p>Average Rating: ${avgRating}</p>
        <h3>Reviews (${sellerReviews.length})</h3>

        <div id="reviewsList"></div>
    `;

    container.appendChild(div);

    let reviewList = div.querySelector("#reviewsList");

    if(sellerReviews.length === 0){
        reviewList.innerHTML = "<p>No reviews yet</p>";
        return;
    }

    /* DISPLAY REVIEWS */
    sellerReviews.forEach(r=>{
        let reviewDiv = document.createElement("div");
        reviewDiv.className = "review";
        reviewDiv.innerHTML = `
            <strong>${r.reviewer}</strong> (${r.rating}★)<br>
            ${r.text}
        `;
        reviewList.appendChild(reviewDiv);
    });
}

const reviewsContainer = document.getElementById("reviewsContainer");
const searchInput = document.getElementById("searchBusiness");

function renderReviews(searchTerm="") {
    reviewsContainer.innerHTML = "";

    // Get all products
    const products = JSON.parse(localStorage.getItem("products")) || [];
    const reviewsDB = JSON.parse(localStorage.getItem("reviewsDB")) || {};

    const filtered = products.filter(p => p.seller.toLowerCase().includes(searchTerm.toLowerCase()));

    filtered.forEach(p => {
        const reviews = reviewsDB[p.id] || [];
        const verifiedReviews = reviews.filter(r => r.verified); // show only verified reviews

        if(verifiedReviews.length > 0) {
            const div = document.createElement("div");
            div.className = "business-reviews";
            div.innerHTML = `<h3>${p.seller} - ${p.name}</h3>` + 
                verifiedReviews.map(r => `<p><strong>${r.user}:</strong> ${r.text} (${r.rating}/5)</p>`).join('');
            reviewsContainer.appendChild(div);
        }
    });
}

// Live search
searchInput.addEventListener("input", (e) => renderReviews(e.target.value));

// Initial render
renderReviews();

</script>

</body>
</html>
